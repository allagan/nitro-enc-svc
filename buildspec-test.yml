version: 0.2

# DeployAndTest stage for nitro-enc-svc.
# Runs inside the VPC so it can reach the internal NLB.
#
# Steps:
#   1. Update DaemonSet images to the commit IMAGE_TAG built in Stage 2
#   2. Wait for DaemonSet rollout
#   3. T-01  Health check  — GET /health → {"status":"ok"}
#   4. T-02  Encrypt round-trip — POST /encrypt → deterministic ciphertext
#   5. T-03  Load test — ab keep-alive c=10 n=1000, zero failures

phases:
  install:
    commands:
      - curl -Lo /usr/local/bin/kubectl
          "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          && chmod +x /usr/local/bin/kubectl
      - apt-get update -y && apt-get install -y apache2-utils

  pre_build:
    commands:
      - aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
      - kubectl cluster-info
      - |
        IMAGE_TAG=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c1-7)
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        ECR="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
        RUNNER_IMG="${ECR}/nitro-enc-svc/dev/runner:${IMAGE_TAG}"
        PROXY_IMG="${ECR}/nitro-enc-svc/dev/vsock-proxy:${IMAGE_TAG}"
        echo "Deploying IMAGE_TAG=$IMAGE_TAG"
        kubectl set image daemonset/nitro-enclave enclave-runner="$RUNNER_IMG" -n nitro-enc-svc
        kubectl set image daemonset/vsock-proxy vsock-proxy="$PROXY_IMG" -n nitro-enc-svc
      - |
        echo "Waiting for nitro-enclave DaemonSet..."
        kubectl rollout status daemonset/nitro-enclave -n nitro-enc-svc --timeout=300s
      - |
        echo "Waiting for vsock-proxy DaemonSet..."
        kubectl rollout status daemonset/vsock-proxy -n nitro-enc-svc --timeout=300s
      - |
        NLB=$(kubectl get svc vsock-proxy-nlb -n nitro-enc-svc \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        echo "NLB hostname: $NLB"
        if [ -z "$NLB" ]; then echo "ERROR: NLB hostname not assigned"; exit 1; fi
      - |
        NLB=$(kubectl get svc vsock-proxy-nlb -n nitro-enc-svc \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        DEADLINE=$(( $(date +%s) + 120 ))
        until curl -sk --max-time 5 "https://$NLB:8443/health" > /dev/null 2>&1; do
          NOW=$(date +%s)
          if [ "$NOW" -ge "$DEADLINE" ]; then
            echo "ERROR: NLB not reachable after 120s"; exit 1
          fi
          echo "Waiting for NLB to be reachable..."; sleep 10
        done
        echo "NLB is reachable"

  build:
    commands:
      - |
        NLB=$(kubectl get svc vsock-proxy-nlb -n nitro-enc-svc \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

        # T-01: Health check
        HEALTH=$(curl -sk --max-time 10 "https://$NLB:8443/health")
        echo "T-01 response: $HEALTH"
        echo "$HEALTH" | grep -q '"status":"ok"' \
          && echo "T-01 PASS" || { echo "T-01 FAIL"; exit 1; }

        # T-02: Encrypt round-trip
        RESP=$(curl -sk --max-time 10 -X POST "https://$NLB:8443/encrypt" \
          -H "Content-Type: application/json" \
          -H "X-Schema-Name: payments-v1" \
          -d '{"payload":{"card_number":"4111111111111111","card_holder_name":"Test User","billing_address":{"street":"1 Test St","city":"Columbus","zip":"43215"}}}')
        echo "T-02 response: $RESP"
        echo "$RESP" | grep -q '"card_number":"v1\.' \
          && echo "T-02 PASS" || { echo "T-02 FAIL"; exit 1; }

        # T-03: ab load test (keep-alive c=10 n=1000)
        echo '{"payload":{"card_number":"4111111111111111","card_holder_name":"Load Test","billing_address":{"street":"1 Main St","city":"Columbus","zip":"43215"}}}' > /tmp/body.json
        ab -k -c 10 -n 1000 \
          -p /tmp/body.json -T "application/json" \
          -H "X-Schema-Name: payments-v1" \
          "https://$NLB:8443/encrypt" | tee /tmp/ab_output.txt
        TPS=$(grep "Requests per second" /tmp/ab_output.txt | awk '{print $4}')
        FAILED=$(grep "Failed requests" /tmp/ab_output.txt | awk '{print $3}')
        echo "T-03: TPS=$TPS Failed=$FAILED"
        [ "$FAILED" = "0" ] && echo "T-03 PASS" || { echo "T-03 FAIL — $FAILED failed"; exit 1; }

        # Write test report
        DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        printf '{"date":"%s","cluster":"%s","nlb":"%s","results":{"health":"PASS","encrypt":"PASS","load_tps":"%s","load_failed":"%s"}}\n' \
          "$DATE" "$CLUSTER_NAME" "$NLB" "$TPS" "$FAILED" > /tmp/test-report.json
        cat /tmp/test-report.json
        echo "All tests passed."

artifacts:
  files:
    - /tmp/test-report.json
    - /tmp/ab_output.txt
  discard-paths: yes
  name: test-results
