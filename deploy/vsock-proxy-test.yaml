# End-to-end test pod: vsock-proxy sidecar + curl test client.
#
# Deploys to the nitro node (aws.amazon.com/nitro-enclaves=true) so the
# vsock-proxy can reach the running enclave via vsock CID=16, port=443.
#
# Usage after applying:
#   kubectl exec -n nitro-enc-svc vsock-proxy-test -c test-client -- \
#     curl -sk -X POST https://127.0.0.1:8443/encrypt \
#     -H "Content-Type: application/json" \
#     -H "X-Schema-Name: payments-v1" \
#     -d '{"merchant_id":"acme","card_number":"4111111111111111","card_holder_name":"Jane Doe","billing_address":{"street":"123 Main St","city":"Springfield","zip":"12345"},"amount_cents":9999}'
#
# Health check:
#   kubectl exec -n nitro-enc-svc vsock-proxy-test -c test-client -- \
#     curl -sk https://127.0.0.1:8443/health
apiVersion: v1
kind: Pod
metadata:
  name: vsock-proxy-test
  namespace: nitro-enc-svc
  labels:
    app: vsock-proxy-test
spec:
  # Must run on the nitro node — vsock is node-local, so the proxy can only
  # reach the enclave (CID=16) if it is on the same physical host.
  nodeSelector:
    aws.amazon.com/nitro-enclaves: "true"
  tolerations:
    - operator: Exists
  restartPolicy: Always

  containers:
    # -------------------------------------------------------------------------
    # vsock-proxy sidecar
    #
    # Bridges TCP 0.0.0.0:8443 ↔ vsock(CID=16, port=443).
    # TLS is forwarded opaquely — TLS terminates inside the enclave.
    # -------------------------------------------------------------------------
    - name: vsock-proxy
      image: 394582308905.dkr.ecr.us-east-2.amazonaws.com/nitro-enc-svc/dev/vsock-proxy:43021e3
      securityContext:
        # AF_VSOCK socket creation may be blocked by the default EKS seccomp
        # profile.  Unconfined allows it without granting full root privileges.
        seccompProfile:
          type: Unconfined
      env:
        - name: LISTEN_PORT
          value: "8443"
        - name: ENCLAVE_CID
          value: "16"
        - name: ENCLAVE_PORT
          value: "443"
        # Required by config validation; not used by the proxy logic itself.
        - name: MAIN_APP_ADDR
          value: "127.0.0.1:8080"
        - name: LOG_LEVEL
          value: "info"
      ports:
        - containerPort: 8443
          name: https-proxy
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "500m"
          memory: "128Mi"

    # -------------------------------------------------------------------------
    # Test client
    #
    # Amazon Linux 2023 with curl for sending test encryption requests.
    # Installs curl on first start; then idles so you can exec in.
    # -------------------------------------------------------------------------
    - name: test-client
      image: public.ecr.aws/amazonlinux/amazonlinux:2023
      command: ["/bin/bash", "-c"]
      args:
        - |
          dnf install -y -q curl 2>/dev/null
          echo "Ready — curl installed. Exec in to run tests."
          sleep infinity
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
