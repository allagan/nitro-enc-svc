# NodePool for Karpenter-managed Nitro Enclave nodes.
#
# Provisions c5.xlarge instances across us-east-2a and us-east-2b.
# Disruption is disabled (budgets: 0 nodes) so DaemonSet-only nodes are never
# voluntarily consolidated or terminated by Karpenter.
#
# The nitro-placeholder Deployment (2 replicas, topology spread across AZs)
# signals Karpenter to keep exactly 2 nodes running — one per AZ.
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: nitro
spec:
  template:
    metadata:
      labels:
        aws.amazon.com/nitro-enclaves: "true"
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: nitro

      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["c5.xlarge"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["us-east-2a", "us-east-2b"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

      # Taint keeps non-enclave workloads off nitro nodes.
      # DaemonSets (nitro-enclave, vsock-proxy, adot-collector) tolerate all taints.
      taints:
        - key: aws.amazon.com/nitro-enclaves
          value: "true"
          effect: NoSchedule

  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: Never
    budgets:
      - nodes: "0"   # never voluntarily terminate; nodes are long-lived DaemonSet hosts
